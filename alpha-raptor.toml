# When ALPHA_DESCRIPTOR_URL is set, this file is used as the base template:
# root runtime settings stay here, while [[feeds]] is regenerated from the
# BusO-Api descriptor into .alpha-raptor/generated/busone-descriptor.toml.
osm_pbf = "https://download.geofabrik.de/europe/italy/centro-latest.osm.pbf"
walk_radius_meters = 450.0
walk_speed_mps = 1.35
max_transfer_candidates = 12
static_reload_interval_secs = 1800
static_diff_tolerance = 0.05
default_max_transfers = 4

[dvni]
knn_candidates = 5
max_walk_radius_meters = 1500.0

[hpf]
max_distance_meters = 4000.0
snap_tolerance_meters = 140.0
snap_quadratic_kappa_meters = 40.0
search_window = 512

[osm_diff]
state_url = "https://download.geofabrik.de/europe/italy/centro-updates/state.txt"
poll_interval_secs = 1800

