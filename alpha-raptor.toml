osm_pbf = "https://download.geofabrik.de/europe/italy/nord-est-latest.osm.pbf"
walk_radius_meters = 450.0
walk_speed_mps = 1.35
max_transfer_candidates = 12
refresh_interval_secs = 45
static_reload_interval_secs = 600
static_diff_tolerance = 0.05
default_max_transfers = 4

[dvni]
knn_candidates = 5
max_walk_radius_meters = 1500.0

[hpf]
max_distance_meters = 4000.0
snap_tolerance_meters = 140.0
snap_quadratic_kappa_meters = 40.0
search_window = 512

[osm_diff]
state_url = "https://download.geofabrik.de/europe/italy/nord-est-updates/state.txt"
poll_interval_secs = 1800

[[feeds]]
id = "padova"
static_gtfs = "http://51.91.97.210:560/gtfs.zip"
trip_updates_url = "${ALPHA_TRIP_UPDATES_URL:-http://127.0.0.1:8080/trip-updates}"
vehicle_positions_url = "${ALPHA_VEHICLE_POSITIONS_URL:-http://127.0.0.1:8080/vehicle-positions}"
depends_on = []

